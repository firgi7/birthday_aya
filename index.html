<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRTHDAY GIFT</title>

<style>
    /* Dasar & Reset */
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:black;font-family:'Courier New',monospace;color:#00ff88;height:100vh;display:flex;justify-content:center;align-items:center; overflow: hidden;}

    /* LOADING SCREEN */
    #loading{position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center; z-index: 100;}
    .terminal{border:2px solid #00ff88;padding:20px;width:300px;text-align:center}
    .bar{width:100%;height:15px;border:1px solid #00ff88;margin-top:10px}
    .progress{height:100%;width:0%;background:#00ff88; transition: width 0.1s;}

    /* GAMEBOY BODY */
    .gameboy{display:none;width:380px;background:#cfcfcf;border-radius:20px 20px 60px 20px;padding:25px;box-shadow:inset -8px -8px 0px #888, 10px 10px 0px #000; position: relative;}
    
    /* SCREEN */
    .screen-outer{background:#555; padding: 20px; border-radius: 10px 10px 40px 10px; margin-bottom: 20px;}
    .screen{background:#021;color:#00ff88;padding:16px;height:220px;border-radius:5px;overflow:hidden;position:relative; border: 4px solid #333; font-size: 14px;}
    
    /* MATRIX EFFECT */
    .matrix-canvas{position:absolute;inset:0;opacity:0.4;pointer-events:none}

    /* INTRO ANIMATION */
    .intro-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center; z-index: 2;}
    .intro-word{font-size:22px;font-weight:bold;letter-spacing:2px;opacity:0;transform:scale(0.5);transition:all .5s ease}
    .intro-word.show{opacity:1;transform:scale(1)}

    .fade-lag{position:absolute;inset:0;background:black;opacity:0;animation:fadeLag 2s forwards; z-index: 5;}
    @keyframes fadeLag{0%{opacity:0} 50%{opacity:1} 100%{opacity:1}}

    /* CONTROLS */
    .controls{display:flex;justify-content:space-between; align-items: center; padding: 10px;}
    .dpad{width:100px;height:100px;position:relative}
    .dpad button{position:absolute;width:35px;height:35px;background:#333;color:white;border:none;border-radius:4px; cursor: pointer; font-size: 18px;}
    .dpad .up{top:0;left:33px}
    .dpad .down{bottom:0;left:33px}
    .dpad .left{left:0;top:37px}
    .dpad .right{right:0;top:37px}
    
    .ab{display:flex;gap:15px; transform: rotate(-20deg);}
    .ab button{width:45px;height:45px;border-radius:50%;background:#a91e4b;color:white;border:none; cursor: pointer; box-shadow: 2px 2px 0px #6d1231; font-weight: bold;}
    .ab button:active{transform: translate(2px, 2px); box-shadow: none;}

    /* MENU */
    .menu-list{display:grid;grid-template-columns: 1fr; gap:8px;margin-top:15px}
    .menu-item{padding:8px;border:1px dashed #0f8; text-align: left; font-size: 12px;}
    .menu-item.active{background:#0f8;color:#021; font-weight: bold;}

    /* GALLERY */
    .gallery-container{position:relative;height:150px;width:100%;display:flex;justify-content:center;align-items:center}
    .gallery-img{position:absolute;max-height:100%;max-width:100%;border:4px solid #fff;opacity:0;transition:opacity .8s; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
    .gallery-img.active{opacity:1}

    /* SNAKE STYLES */
    #snake-canvas { background: #011; display: block; margin: 0 auto; border: 1px solid #00ff88; }

    /* CAKE & FLOWERS STYLES */
    .cake-container { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 10px; }
    .cake { width: 80px; height: 50px; background: #ffccff; border-radius: 5px 5px 0 0; position: relative; border: 2px solid #fff; }
    .cake::before { content: ''; position: absolute; width: 80px; height: 15px; background: #ff66cc; bottom: 10px; left: 0; }
    .candle { position: absolute; width: 6px; height: 20px; background: #fff; top: -20px; left: 37px; border: 1px solid #000; }
    .flame { position: absolute; width: 10px; height: 15px; background: #ffcc00; border-radius: 50% 50% 20% 20%; top: -35px; left: 35px; animation: flicker 0.1s infinite; box-shadow: 0 0 10px orange; }
    
    @keyframes flicker {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
    }

    .flower-box { font-size: 20px; margin-top: 15px; animation: sway 2s infinite ease-in-out; }
    @keyframes sway {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
    }
</style>
</head>
<body>

<audio id="bgMusic" loop src="music.mp3"></audio>

<div id="loading">
  <div class="terminal">
    <h3>BIRTHDAY GIFTT</h3>
    <p id="status">> BOOTING...</p>
    <div class="bar"><div class="progress" id="progress"></div></div>
    <p id="percent">0%</p>
    <p style="font-size: 10px; margin-top: 10px; opacity: 0.5;">(Tekan layar jika musik tidak muncul)</p>
  </div>
</div>

<div class="gameboy" id="gameboy">
  <div class="screen-outer">
    <div class="screen" id="screen"></div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="up" onclick="moveInput('up')">▲</button>
      <button class="down" onclick="moveInput('down')">▼</button>
      <button class="left" onclick="moveInput('left')">◀</button>
      <button class="right" onclick="moveInput('right')">▶</button>
    </div>
    <div class="ab">
      <button class="b" onclick="back()">B</button>
      <button class="a" onclick="selectMenu()">A</button>
    </div>
  </div>
</div>

<script>
let progress = 0;
let loadingInterval = setInterval(() => {
  progress += Math.floor(Math.random() * 10);
  if(progress > 100) progress = 100;
  
  document.getElementById('progress').style.width = progress + '%';
  document.getElementById('percent').innerText = progress + '%';
  
  if(progress >= 100) {
    clearInterval(loadingInterval);
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('gameboy').style.display = 'block';
        
        // MEMULAI LAGU SETELAH BOOTING
        const music = document.getElementById('bgMusic');
        music.play().catch(error => {
            console.log("Autoplay dicegah browser, musik akan menyala setelah klik pertama.");
        });

        showIntro();
    }, 500);
  }
}, 150);

const screen = document.getElementById('screen');
let view = 'intro';
let idx = 0;
const menus = ["MESSAGE", "GALLERY", "SNAKE GAME", "SURPRISE GIFT"];
const images = [
  'foto1.jpg',
  'foto2.jpeg',
  'foto3.jpeg',
  'foto4.jpg',
  'foto5.jpg'
];
let gIndex = 0;
let autoSlide;

let snake, food, snakeScore, snakeDir, snakeGameInterval;

function showIntro() {
  screen.innerHTML = `
    <canvas class='matrix-canvas' id='matrix'></canvas>
    <div class='intro-center' id='introBox'></div>
  `;

  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  canvas.width = screen.clientWidth;
  canvas.height = screen.clientHeight;

  const letters = "010101HEYTML";
  const fontSize = 10;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 17, 0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff88";
    ctx.font = fontSize + "px monospace";
    for(let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }

  let matrixInterval = setInterval(drawMatrix, 50);

  const words = ["HAPPY", "BIRTHDAY", "SPECIAL", "FOR YOU 🎉"];
  const box = document.getElementById('introBox');
  let i = 0;

  function showWord() {
    box.innerHTML = "";
    let span = document.createElement('div');
    span.className = 'intro-word';
    span.innerText = words[i];
    box.appendChild(span);
    setTimeout(() => span.classList.add('show'), 50);
    i++;
    if(i < words.length) {
      setTimeout(showWord, 1200);
    } else {
      setTimeout(() => {
        clearInterval(matrixInterval);
        const fade = document.createElement('div');
        fade.className = 'fade-lag';
        screen.appendChild(fade);
        setTimeout(() => renderHome(), 1500);
      }, 2000);
    }
  }
  showWord();
}

function renderHome() {
  view = 'home';
  if(snakeGameInterval) clearInterval(snakeGameInterval);
  screen.innerHTML = `
    <h3 style="border-bottom:1px solid #0f8; padding-bottom:5px">Menu Utama</h3>
    <div class='menu-list'>
      ${menus.map((m, i) => `<div class='menu-item ${i === idx ? 'active' : ''}'>${i === idx ? '> ' : ''}${m}</div>`).join('')}
    </div>
    <p style="margin-top:15px; font-size:9px; opacity:0.7">Gunakan UP/DOWN & A</p>
  `;
}

function move(delta) {
  if(view === 'home') {
    idx = (idx + delta + menus.length) % menus.length;
    renderHome();
  }
}

function moveInput(dir) {
    if(view === 'home') {
        if(dir === 'up') move(-1);
        if(dir === 'down') move(1);
    } else if (view === 'snake') {
        if (dir === 'up' && snakeDir !== 'down') snakeDir = 'up';
        if (dir === 'down' && snakeDir !== 'up') snakeDir = 'down';
        if (dir === 'left' && snakeDir !== 'right') snakeDir = 'left';
        if (dir === 'right' && snakeDir !== 'left') snakeDir = 'right';
    }
}

function selectMenu() {
  if(view !== 'home') return;
  const m = menus[idx];
  if(m === 'MESSAGE') showMessage();
  if(m === 'GALLERY') showGallery();
  if(m === 'SNAKE GAME') startSnakeGame();
  if(m === 'SURPRISE GIFT') showGift();
}

function back() {
  if(autoSlide) clearInterval(autoSlide);
  if(snakeGameInterval) clearInterval(snakeGameInterval);
  renderHome();
}

function showMessage() {
  view = 'message';
  screen.innerHTML = `
    <h3 style="font-size:12px; color:#fff">Dear You...</h3>
    <p style="margin-top:10px">
      Selamat ulang tahun ay! 🎉🎂<br><br>
      wkwkk dah tua<br><br>
      Semoga di umur yang baru ini lu makin bahagia seneng dan sehat selalu.<br><br>
      Duh apalagi ya, ga biasa ngucapin ulang tahun jirr<br><br>
      ya intinya sukses terus semoga di permudah semua urusan lu, kelakuan lu jangan kyk bahlil<br><br>
      Makasih udah jadi orang yang asik buat diajak bercanda walaupun baperan wkwk, dah gausah panjang panjang, malas ngetik<br><br>
      <br><br>
      P.S. Traktirannya ditunggu 😏
    </p>
    <p style="margin-top:10px; color:#fff">[B] Kembali</p>
  `;
}

function showGallery() {
  view = 'gallery';
  gIndex = 0;
  renderGallery();
  if(autoSlide) clearInterval(autoSlide);
  autoSlide = setInterval(() => {
    gIndex = (gIndex + 1) % images.length;
    updateGallery();
  }, 2500);
}

function renderGallery() {
  screen.innerHTML = `
    <h3 style="font-size:12px; margin-bottom:10px"></h3>
    <div class='gallery-container'>
      ${images.map((src, i) => `<img src='${src}' class='gallery-img ${i === gIndex ? 'active' : ''}'>`).join('')}
    </div>
    <p style="margin-top:15px; text-align:center">[B] Kembali</p>
  `;
}

function updateGallery() {
  const imgs = document.querySelectorAll('.gallery-img');
  imgs.forEach((img, i) => {
    img.classList.toggle('active', i === gIndex);
  });
}

function startSnakeGame() {
  view = 'snake';
  screen.innerHTML = `
    <h3 style="font-size:12px; text-align:center; margin-bottom:5px">Snake Game</h3>
    <canvas id="snake-canvas"></canvas>
    <p id="snake-score" style="text-align:center; margin-top:5px">Skor: 0</p>
    <p style="font-size:8px; text-align:center; opacity:0.6">Gunakan D-Pad / Panah</p>
  `;

  const canvas = document.getElementById('snake-canvas');
  const ctx = canvas.getContext('2d');
  const box = 10;
  canvas.width = 160;
  canvas.height = 140;

  snake = [{ x: 8 * box, y: 7 * box }];
  food = {
    x: Math.floor(Math.random() * 15 + 1) * box,
    y: Math.floor(Math.random() * 13 + 1) * box
  };
  snakeScore = 0;
  snakeDir = "right";

  function drawSnake() {
    ctx.fillStyle = "#021";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < snake.length; i++) {
      ctx.fillStyle = (i === 0) ? "#00ff88" : "#008844";
      ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    let snakeX = snake[0].x;
    let snakeY = snake[0].y;

    if (snakeDir === "left") snakeX -= box;
    if (snakeDir === "up") snakeY -= box;
    if (snakeDir === "right") snakeX += box;
    if (snakeDir === "down") snakeY -= box;

    if (snakeX === food.x && snakeY === food.y) {
      snakeScore++;
      document.getElementById('snake-score').innerText = "Skor: " + snakeScore;
      food = {
        x: Math.floor(Math.random() * 15 + 1) * box,
        y: Math.floor(Math.random() * 13 + 1) * box
      };
    } else {
      snake.pop();
    }

    let newHead = { x: snakeX, y: snakeY };

    if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
      clearInterval(snakeGameInterval);
      alert("Game Over! Skor kamu: " + snakeScore);
      renderHome();
    }

    snake.unshift(newHead);
  }

  function collision(head, array) {
    for (let i = 0; i < array.length; i++) {
      if (head.x === array[i].x && head.y === array[i].y) return true;
    }
    return false;
  }

  snakeGameInterval = setInterval(drawSnake, 100);
}

function showGift() {
  view = 'gift';
  screen.innerHTML = `
    <div class="cake-container">
        <h3 style="color:#fff; margin-bottom:10px"></h3>
        <div class="cake">
            <div class="candle"></div>
            <div class="flame"></div>
        </div>
        <div class="flower-box">
            
        </div>
        <p style="margin-top:20px; font-size:10px; text-align:center">
           HAPPY BIRTHDAY!<br>
          
        </p>
        <p style="margin-top:10px; color:#fff">[B] Kembali</p>
    </div>
  `;
}

// Tambahan agar bisa pakai keyboard
window.addEventListener('keydown', (e) => {
    if(e.key === "ArrowUp") moveInput('up');
    if(e.key === "ArrowDown") moveInput('down');
    if(e.key === "ArrowLeft") moveInput('left');
    if(e.key === "ArrowRight") moveInput('right');
    if(e.key === "z" || e.key === "Enter") selectMenu();
    if(e.key === "x" || e.key === "Escape") back();
});

// Listener tambahan untuk memastikan musik menyala setelah interaksi pertama jika terblokir
document.body.addEventListener('click', () => {
    const music = document.getElementById('bgMusic');
    if (music.paused) music.play();
}, { once: true });
</script>

</body>
</html>
